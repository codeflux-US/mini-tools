<!DOCTYPE html>
<html>
<head>
  <title>Mini Tools</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

<h2>Mini Tools 🌐</h2>

<!-- 🔗 URL INPUT -->
<input type="text" id="url" placeholder="Enter https://example.com">
<button onclick="loadSite()">Load</button>

<!-- 🔘 TABS -->
<div class="tabs">
  <button onclick="showTab('preview', this)">Preview</button>
  <button onclick="showTab('elements', this)">Elements</button>
  <button onclick="showTab('network', this)">Network</button>
</div>

<!-- 🌐 PREVIEW -->
<div id="preview" class="tab">
  <iframe id="frame"></iframe>
</div>

<!-- 🧱 ELEMENTS -->
<div id="elements" class="tab">
  <pre id="elementsContent"></pre>
</div>

<!-- 🌍 NETWORK -->
<div id="network" class="tab"></div>

<!-- 💻 CONSOLE -->
<div class="console">
  <textarea id="code" placeholder="Write JS here..."></textarea>
  <button onclick="runJS()">Run JS</button>
  <pre id="output"></pre>
</div>

<!-- 🔍 INSPECTOR -->
<div id="inspectBox">
  Click any element in Preview to inspect
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
