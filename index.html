<!DOCTYPE html>
<html>
<head>
  <title>Mini Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Mini Tools 🌐</h2>

<input type="text" id="url" placeholder="Enter https://example.com">
<button onclick="loadSite()">Load</button>

<div class="tabs">
  <button onclick="showTab('preview')">Preview</button>
  <button onclick="showTab('elements')">Elements</button>
  <button onclick="showTab('network')">Network</button>
</div>

<div id="preview" class="tab">
  <iframe id="frame"></iframe>
</div>

<div id="elements" class="tab"></div>

<div id="network" class="tab"></div>

<div class="console">
  <textarea id="code"></textarea>
  <button onclick="runJS()">Run JS</button>
  <pre id="output"></pre>
</div>

<script src="script.js"></script>
</body>
</html>
